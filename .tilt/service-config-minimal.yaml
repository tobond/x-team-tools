# Minimal Service Configuration for Testing Tilt Environment
# This configuration focuses on external dependencies and infrastructure services

services:
  # Database service (PostgreSQL)
  database:
    type: "external"
    image: "postgres:15"
    ports: [5432]
    env_vars:
      - name: "POSTGRES_DB"
        value: "testdb"
      - name: "POSTGRES_USER"
        value: "testuser"
      - name: "POSTGRES_PASSWORD"
        value: "testpass"
    resources:
      cpu: "500m"
      memory: "512Mi"
    health_check:
      command: ["pg_isready", "-U", "testuser", "-d", "testdb"]

  # Redis service for caching
  redis:
    type: "external"
    image: "redis:7-alpine"
    ports: [6379]
    resources:
      cpu: "250m"
      memory: "256Mi"
    health_check:
      command: ["redis-cli", "ping"]

# Global configuration
global:
  namespace_prefix: "dev-"
  default_resources:
    cpu: "500m"
    memory: "512Mi"
  monitoring:
    enabled: true
    metrics_port: 9090
