# Developer Configuration for ai-agentic-test-app Testing
# Updated to include the test application

developer:
  # Developer ID for namespace isolation
  id: "dtobon"

cluster:
  # Type of Kubernetes cluster to use
  # Will auto-setup if not available
  type: "kind"
  
  # Cluster name (for kind/k3d clusters)
  name: "tilt-dev"

services:
  # Full stack including the test application
  enabled:
    - ai-agentic-test-app
    - database
    - redis

  # Build the test app locally for fast development cycles
  build_locally:
    - ai-agentic-test-app

  # Use public images for infrastructure services
  use_ecr: []

# Testing configuration
testing:
  full_stack_setup: true
  ready_for_integration: true
