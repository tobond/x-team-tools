# Example configuration showing both Dockerfile and Command build modes
# This demonstrates the dual-mode build system capabilities

services:
  # Example 1: Maven Spring Boot service using command build
  spring-boot-service:
    type: "java"
    build_command: "mvn spring-boot:build-image -Dspring-boot.build-image.imageName=spring-boot-service:latest"
    build_working_dir: "./services/spring-boot-service"
    dependencies: ["database"]
    ports: [8080, 8443]
    env_vars:
      - name: "SPRING_PROFILES_ACTIVE"
        value: "local"
      - name: "DATABASE_URL"
        value: "jdbc:postgresql://database:5432/testdb"
    resources:
      cpu: "1000m"
      memory: "1Gi"
    health_check:
      path: "/actuator/health"
      port: 8080

  # Example 2: Gradle service using command build
  gradle-service:
    type: "java"
    build_command: "gradle bootBuildImage --imageName=gradle-service:latest"
    build_working_dir: "./services/gradle-service"
    dependencies: ["redis"]
    ports: [9090]
    env_vars:
      - name: "REDIS_URL"
        value: "redis://redis:6379"
    resources:
      cpu: "500m"
      memory: "512Mi"

  # Example 3: Python service using traditional Dockerfile build
  python-api:
    type: "python"
    build_context: "./services/python-api"
    dockerfile: "./services/python-api/Dockerfile"
    dependencies: ["database", "redis"]
    ports: [8000]
    env_vars:
      - name: "DATABASE_URL"
        value: "postgresql://testuser:testpass@database:5432/testdb"
      - name: "REDIS_URL"
        value: "redis://redis:6379"
      - name: "LOG_LEVEL"
        value: "DEBUG"
    resources:
      cpu: "500m"
      memory: "512Mi"
    health_check:
      path: "/health"
      port: 8000

  # Example 4: Node.js service using traditional Dockerfile build
  nodejs-api:
    type: "nodejs"
    build_context: "./services/nodejs-api"
    dockerfile: "./services/nodejs-api/Dockerfile"
    dependencies: ["redis"]
    ports: [3000, 3001]
    env_vars:
      - name: "NODE_ENV"
        value: "development"
      - name: "REDIS_URL"
        value: "redis://redis:6379"
    resources:
      cpu: "300m"
      memory: "256Mi"

  # Supporting infrastructure services
  database:
    type: "external"
    image: "postgres:16.4"
    ports: [5432]
    env_vars:
      - name: "POSTGRES_DB"
        value: "testdb"
      - name: "POSTGRES_USER"
        value: "testuser"
      - name: "POSTGRES_PASSWORD"
        value: "testpass"
    resources:
      cpu: "500m"
      memory: "512Mi"
    health_check:
      command: ["pg_isready", "-U", "testuser", "-d", "testdb"]

  redis:
    type: "external"
    image: "redis:7-alpine"
    ports: [6379]
    env_vars:
      - name: "REDIS_PASSWORD"
        value: "testpass"
    resources:
      cpu: "250m"
      memory: "256Mi"
    health_check:
      command: ["redis-cli", "ping"]

# Global configuration
global:
  namespace_prefix: "dev-"
  default_resources:
    cpu: "500m"
    memory: "512Mi"
  monitoring:
    enabled: true
    metrics_port: 9090